services:
  - type: web
    name: flask-board
    env: python
    rootDir: my_board
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE
        value: /var/data/board.db
      - key: PYTHON_VERSION
        value: 3.12.3
    disk:
      name: flask-board-data
      mountPath: /var/data
      sizeGB: 1
