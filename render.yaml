services:
  - type: web
    name: flask-board
    env: python
    plan: free
    buildCommand: pip install -r my_board/requirements.txt
    startCommand: gunicorn --chdir my_board "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3
